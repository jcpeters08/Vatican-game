<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vocab Exchange Challenge</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/compat/app.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/compat/database.min.js"></script>

firebase.initializeApp({
  apiKey: "AIzaSyB1gPk1gCfsuE5kGJ93JhJ1kdpis9layJ0",
  authDomain: "trivia-pm.firebaseapp.com",
  databaseURL: "https://trivia-pm-default-rtdb.firebaseio.com",
  projectId: "trivia-pm",
  storageBucket: "trivia-pm.firebasestorage.app",
  messagingSenderId: "319057453477",
  appId: "1:319057453477:web:3ad1fe6349cfbaa4e6484c"

const db = firebase.database();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a0e05;min-height:100vh;}
input{font-family:Georgia,serif;}
button{font-family:Georgia,serif;}
input::placeholder{color:#6b4a1e;}
input:focus{outline:none;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const vocab = [
  ["el Vaticano","the Vatican"],["la residencia","the residence"],["el fresco","the fresco"],
  ["la máquina de espresso","the espresso machine"],["la cava de vinos","the wine cellar"],
  ["el aristócrata","the aristocrat"],["el sommelier","the sommelier"],["la santidad","holiness"],
  ["el guardarropa","the wardrobe"],["las vestiduras","the vestments"],["la tela","the fabric"],
  ["la sastrería","tailoring"],["los Guardias Suizos","the Swiss Guards"],["la alta costura","haute couture"],
  ["los zapatos","the shoes"],["la gravitas","gravitas"],["la monja","the nun"],
  ["las zapatillas rojas","the red slippers"],["las audiencias","the audiences"],
  ["el espejo","the mirror"],["la Vespa","the Vespa"],["los sacerdotes","the priests"],
  ["los jardines","the gardens"],["los hábitos","the habits"],["los manuscritos","the manuscripts"],
  ["la biblioteca","the library"],["el cardenal","the cardinal"],["el obispo","the bishop"],
  ["la puerta","the door"],["el mármol","the marble"],["la fe","faith"],
  ["los taninos","the tannins"],["el embajador","the ambassador"],["el equilibrio","the balance"],
  ["el cuero","the leather"],["estar","to be (temporary/state)"],["encontrarse","to find oneself"],
  ["tener","to have"],["comenzar","to begin"],["murmurar","to murmur"],
  ["mirar","to look"],["esperar","to wait / to hope"],["prevalecer","to prevail"],
  ["asentir","to nod / assent"],["entender","to understand"],["flotar","to float"],
  ["susurrar","to whisper"],["responder","to respond"],["rechazar","to reject"],
  ["coquetear","to flirt"],["concluir","to conclude"],["declarar","to declare"],
  ["caminar","to walk"],["resonar","to echo / resonate"],["brillar","to shine"],
  ["ajustar","to adjust"],["guiar","to guide"],["seguir","to follow"],
  ["detener","to stop"],["interrumpir","to interrupt"],["restaurar","to restore"],
  ["revelar","to reveal"],["albergar","to house / contain"],["insistir","to insist"],
  ["reflexionar","to reflect"],["considerar","to consider"],["creer","to believe"],
  ["ser","to be (essential)"],["haber","to have / there is"],["hacer","to do / make"],
  ["poder","can / to be able to"],["deber","should / must"],["tomar","to take"],
  ["salir","to leave / go out"],["sin embargo","however"],["por supuesto","of course"],
  ["al parecer","apparently"],["en cambio","in contrast / instead"],["entonces","then"],
  ["inevitablemente","inevitably"],["al final","in the end"],["porque","because"],
  ["ya que","since / given that"],["es decir","that is to say"],["por ejemplo","for example"],
  ["de hecho","in fact"],
];

const correctQuips = [
  "Infallible. Basically papal.","The Codex approves.","Cardinal knowledge.",
  "Even the sommelier is impressed.","Holiness has its perks.",
  "The Swiss Guards salute you.","The marble positively gleams.",
  "His Holiness nods approvingly.","The wine cellar opens its doors.",
  "A vestment of triumph.","The fresco was painted in your honor.",
  "The Vespa revs in celebration.","Gravitas achieved.",
  "The library adds your name to the manuscripts.","Alta costura intellect.",
];

const wrongQuips = [
  "The Swiss Guards are judging you.","The Pope is reflecting on this.",
  "A vestment of shame.","Even the Vespa could have done better.",
  "The marble weeps.","The sommelier has left the building.",
  "The cardinal is deeply disappointed.","The fresco is cracking.",
  "His Holiness will pray for you.","The wine cellar remains locked.",
];

const ROUND_SIZE = 15;
const TIME_PER_Q = 15;

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestions() {
  const used = new Set();
  const result = [];
  for (let n = 0; n < ROUND_SIZE; n++) {
    const available = vocab.filter((_, i) => !used.has(i));
    const pool = available.length >= 4 ? available : vocab;
    const pair = pick(pool);
    used.add(vocab.indexOf(pair));
    const [es, en] = pair;
    const dir = Math.random() < 0.5 ? "es2en" : "en2es";
    const prompt = dir === "es2en" ? es : en;
    const answer = dir === "es2en" ? en : es;
    const wrong = shuffle(vocab.filter(p => p !== pair)).slice(0, 3).map(p => dir === "es2en" ? p[1] : p[0]);
    result.push({ prompt, answer, choices: shuffle([answer, ...wrong]), dir });
  }
  return result;
}

const col = {
  bg: "#1a0e05", bg2: "#2d1a0a", bg3: "rgba(20,12,3,0.9)",
  gold: "#c9a84c", goldDim: "#a07840", goldFaint: "#6b4a1e",
  text: "#e8d5b0", textDim: "#c8b090", border: "#5a3d1a", borderDark: "#3d2510",
};

function Divider() {
  return (
    <div style={{display:"flex",alignItems:"center",gap:10,margin:"1.25rem 0",color:col.goldFaint}}>
      <div style={{flex:1,height:1,background:"linear-gradient(90deg,transparent,#6b4a1e,transparent)"}}/>
      <span style={{fontSize:12}}>✦</span>
      <div style={{flex:1,height:1,background:"linear-gradient(90deg,transparent,#6b4a1e,transparent)"}}/>
    </div>
  );
}

function ChoiceButton({ c, selected, answer, onSelect }) {
  let bg = col.bg3, border = col.borderDark, color = col.textDim;
  if (selected) {
    if (c === answer)       { bg="rgba(30,70,30,0.5)";  border="#4a8a4a"; color="#8fcc8f"; }
    else if (c === selected){ bg="rgba(70,20,20,0.5)";  border="#8a3030"; color="#cc8080"; }
  }
  return (
    <button
      onClick={() => !selected && onSelect(c)}
      style={{background:bg,border:`1px solid ${border}`,borderRadius:8,padding:"14px 10px",
        fontSize:15,color,lineHeight:1.3,cursor:selected?"default":"pointer",width:"100%",textAlign:"center"}}
    >{c}</button>
  );
}

function btn(ghost) {
  return {
    width:"100%",padding:12,borderRadius:8,fontSize:13,letterSpacing:"1.5px",
    cursor:"pointer",textTransform:"uppercase",marginBottom:8,
    border: ghost ? `1px solid ${col.border}` : `1px solid ${col.gold}`,
    background: ghost ? "transparent" : "rgba(180,130,50,0.15)",
    color: ghost ? col.goldDim : col.gold,
  };
}

function App() {
  const [screen, setScreen]         = useState("home");
  const [name, setName]             = useState("");
  const [questions, setQuestions]   = useState([]);
  const [qIdx, setQIdx]             = useState(0);
  const [score, setScore]           = useState(0);
  const [selected, setSelected]     = useState(null);
  const [timer, setTimer]           = useState(TIME_PER_Q);
  const [quip, setQuip]             = useState("");
  const [leaderboard, setLB]        = useState([]);
  const [loadingLB, setLoadingLB]   = useState(false);
  const [finalScore, setFinalScore] = useState(0);
  const timerRef    = useRef(null);
  const selectedRef = useRef(null);
  const scoreRef    = useRef(0);

  const fetchLB = async () => {
    setLoadingLB(true);
    try {
      const snap = await db.ref("vocab_leaderboard").orderByChild("score").limitToLast(20).once("value");
      const entries = [];
      snap.forEach(child => entries.unshift(child.val()));
      setLB(entries);
    } catch(e) {
      console.error("fetchLB error:", e);
    }
    setLoadingLB(false);
  };

  const saveLB = async (entry) => {
    try {
      await db.ref("vocab_leaderboard").push(entry);
    } catch(e) {
      console.error("saveLB error:", e);
    }
  };

  const startGame = () => {
    if (!name.trim()) return;
    const qs = buildQuestions();
    selectedRef.current = null;
    scoreRef.current = 0;
    setQuestions(qs);
    setQIdx(0);
    setScore(0);
    setSelected(null);
    setTimer(TIME_PER_Q);
    setScreen("playing");
  };

  useEffect(() => {
    if (screen !== "playing") return;
    clearInterval(timerRef.current);
    selectedRef.current = null;
    timerRef.current = setInterval(() => {
      setTimer(t => {
        if (t <= 1) {
          clearInterval(timerRef.current);
          if (!selectedRef.current) handleAnswer(null);
          return 0;
        }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [screen, qIdx]);

  const handleAnswer = (choice) => {
    if (selectedRef.current) return;
    clearInterval(timerRef.current);
    const val = choice || "__timeout__";
    selectedRef.current = val;
    setSelected(val);
    const q = questions[qIdx];
    const correct = choice === q.answer;
    const pts = correct ? Math.max(1, timer) * 10 : 0;
    scoreRef.current = scoreRef.current + pts;
    setQuip(pick(correct ? correctQuips : wrongQuips));
    setScore(s => s + pts);
  };

  const next = async () => {
    if (qIdx + 1 >= ROUND_SIZE) {
      const fs = scoreRef.current;
      setFinalScore(fs);
      const entry = { name: name.trim(), score: fs, date: new Date().toLocaleDateString() };
      await saveLB(entry);
      setScreen("result");
    } else {
      selectedRef.current = null;
      setSelected(null);
      setTimer(TIME_PER_Q);
      setQIdx(i => i + 1);
    }
  };

  const wrap = {minHeight:"100vh",background:`linear-gradient(160deg,${col.bg} 0%,${col.bg2} 50%,${col.bg} 100%)`,color:col.text,fontFamily:"Georgia,serif",padding:"0 0 3rem"};
  const scr  = {maxWidth:500,margin:"0 auto",padding:"2rem 1.25rem"};

  if (screen === "home") return (
    <div style={wrap}><div style={scr}>
      <div style={{textAlign:"center",fontSize:36,color:col.gold,margin:"1rem 0 0.5rem"}}>✝</div>
      <div style={{fontSize:22,fontWeight:600,color:col.gold,letterSpacing:2,textAlign:"center",textTransform:"uppercase"}}>Vocab Exchange</div>
      <div style={{fontSize:14,color:col.goldDim,textAlign:"center",fontStyle:"italic",marginBottom:"0.25rem"}}>Spanish · English · 15 Questions</div>
      <Divider/>
      <div style={{background:"rgba(30,18,6,0.8)",border:`1px solid ${col.border}`,borderRadius:12,padding:"1.5rem"}}>
        <div style={{border:"1px solid rgba(180,130,50,0.2)",borderRadius:8,padding:"1.25rem"}}>
          <input type="text" placeholder="Enter your name" value={name}
            onChange={e => setName(e.target.value)}
            onKeyDown={e => e.key==="Enter" && startGame()}
            style={{width:"100%",background:"rgba(0,0,0,0.3)",border:`1px solid ${col.border}`,borderRadius:8,padding:"12px 16px",color:col.text,fontSize:16,marginBottom:12,boxSizing:"border-box"}}/>
          <button onClick={startGame} style={btn(false)}>Begin the Examination</button>
          <button onClick={async()=>{await fetchLB();setScreen("board");}} style={btn(true)}>Hall of Records</button>
        </div>
      </div>
      <div style={{textAlign:"center",color:col.goldFaint,fontSize:18,margin:"1rem 0",letterSpacing:8}}>· · ·</div>
      <div style={{textAlign:"center",fontSize:13,color:"#4a3010",fontStyle:"italic"}}>Speed earns grace.</div>
    </div></div>
  );

  if (screen === "playing") {
    const q = questions[qIdx];
    if (!q) return null;
    return (
      <div style={wrap}><div style={scr}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",fontSize:12,letterSpacing:1,color:col.goldDim}}>
          <span>{qIdx+1} / {ROUND_SIZE}</span>
          <span style={{color:timer<=5?"#c0392b":col.gold,fontWeight:600,fontSize:14}}>⏱ {timer}s</span>
          <span>{score} pts</span>
        </div>
        <div style={{height:2,background:col.bg2,borderRadius:1,marginBottom:"1.5rem"}}>
          <div style={{height:"100%",background:`linear-gradient(90deg,${col.goldFaint},${col.gold})`,width:`${(qIdx/ROUND_SIZE)*100}%`}}/>
        </div>
        <div style={{background:col.bg3,border:`1px solid ${col.border}`,borderRadius:12,padding:"1.5rem",marginBottom:"1.25rem",textAlign:"center"}}>
          <div style={{fontSize:11,letterSpacing:2,color:col.goldFaint,textTransform:"uppercase",marginBottom:12}}>
            {q.dir==="es2en"?"Spanish → English":"English → Spanish"}
          </div>
          <div style={{fontSize:26,fontWeight:500,color:col.text,lineHeight:1.3}}>{q.prompt}</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:"1rem"}}>
          {q.choices.map(c => <ChoiceButton key={c} c={c} selected={selected} answer={q.answer} onSelect={handleAnswer}/>)}
        </div>
        {selected && <>
          <div style={{textAlign:"center",fontStyle:"italic",fontSize:15,color:col.goldDim,marginBottom:"1rem"}}>{quip}</div>
          <button onClick={next} style={btn(false)}>
            {qIdx+1>=ROUND_SIZE?"View Your Judgment":"Next Question"}
          </button>
        </>}
      </div></div>
    );
  }

  if (screen === "result") {
    const msg = finalScore>=1200?"The Codex shall remember your name."
      :finalScore>=800?"A commendable examination. The cardinal approves."
      :finalScore>=400?"Further study is recommended."
      :"The Swiss Guards are escorting you out.";
    return (
      <div style={wrap}><div style={scr}>
        <div style={{textAlign:"center",fontSize:36,color:col.gold,margin:"1rem 0 0.5rem"}}>✝</div>
        <div style={{fontSize:22,fontWeight:600,color:col.gold,letterSpacing:2,textAlign:"center",textTransform:"uppercase"}}>Judgment</div>
        <Divider/>
        <div style={{fontSize:48,color:col.gold,textAlign:"center",margin:"1rem 0 4px"}}>{finalScore}</div>
        <div style={{textAlign:"center",fontSize:14,color:col.goldFaint,fontStyle:"italic",marginBottom:"1.5rem"}}>{name} · {new Date().toLocaleDateString()}</div>
        <div style={{background:"rgba(30,18,6,0.8)",border:`1px solid ${col.border}`,borderRadius:12,padding:"1.25rem",marginBottom:"1.5rem",textAlign:"center",fontSize:15,color:col.goldDim,fontStyle:"italic",lineHeight:1.6}}>{msg}</div>
        <button onClick={startGame} style={btn(false)}>Examine Again</button>
        <button onClick={async()=>{await fetchLB();setScreen("board");}} style={btn(true)}>Hall of Records</button>
        <button onClick={()=>{setScreen("home");setName("");}} style={btn(true)}>Change Penitent</button>
      </div></div>
    );
  }

  if (screen === "board") return (
    <div style={wrap}><div style={scr}>
      <div style={{fontSize:22,fontWeight:600,color:col.gold,letterSpacing:2,textAlign:"center",textTransform:"uppercase"}}>Hall of Records</div>
      <div style={{fontSize:14,color:col.goldDim,textAlign:"center",fontStyle:"italic"}}>Top 20 · All Time</div>
      <Divider/>
      {loadingLB && <div style={{textAlign:"center",color:col.goldFaint,fontStyle:"italic",padding:"1rem"}}>Consulting the archives…</div>}
      {!loadingLB && leaderboard.length===0 && <div style={{textAlign:"center",color:col.goldFaint,fontStyle:"italic",padding:"1rem"}}>The archives are empty. Be the first.</div>}
      {!loadingLB && leaderboard.map((e,i) => (
        <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid rgba(90,61,26,0.3)"}}>
          <span style={{fontSize:13,color:i===0?col.gold:i===1?"#a0a0b0":i===2?"#c08050":col.goldFaint,minWidth:28}}>#{i+1}</span>
          <span style={{flex:1,fontSize:16,color:col.textDim}}>{e.name}</span>
          <span style={{fontSize:15,color:col.gold,fontWeight:600}}>{e.score}</span>
          <span style={{fontSize:12,color:"#4a3010",minWidth:60,textAlign:"right"}}>{e.date}</span>
        </div>
      ))}
      <div style={{textAlign:"center",color:col.goldFaint,fontSize:18,margin:"1rem 0",letterSpacing:8}}>· · ·</div>
      <button onClick={()=>setScreen("home")} style={btn(true)}>Return</button>
    </div></div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
